<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>weatherio</title>
    <meta name="title" content="weatherio">
    <meta name="keywords" content="weather, weather app, weather application, real-time weather, weather information, weather forecast">
    <meta name="description" content="weatherio is a weather application that provides real-time weather information for any location.">

    <!-- favicon -->
    <link rel="shortcut icon" type="image/svg+xml" href="./favicon.svg">
    <!-- Import google Icon -->
     <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <!-- custom css -->
    <link rel="stylesheet" href="./assets/css/style.css">
    <!-- custom js -->
     <script src="./assets/js/script.js" defer></script>
     
</head>
<body>
      <main class="main-container">
           <header class="input-container">
              <input class="city-input" placeholder="Search City" type="text">
              <button class="search-btn">
                  <span class="material-symbols-outlined">
                    search
                  </span>
              </button>
           </header>

           <section class="weather-info" style="display: none;">
             <div class="location-date-container">
                 <div class="location">
                    <span class="material-symbols-outlined">
                      location_on
                    </span>
                    <h4 class="country-txt">Jakarta</h4>
                 </div>
                 <h5 class="current-date-txt regular-txt">wed,07 Aug</h5>
             </div>
              <div class="weather-summary-container">
                <img src="./assets/weather/clouds.svg" alt="" class="weather-summary-img">
                <div class="weather-summary-info">
                    <h1 class="temp-txt">29 °C</h1>
                    <h3 class="condition-txt regular-txt">Clouds</h3>
                </div>
              </div>
              <div class="weather-conditions-container">
                 <div class="condition-item">
                    <span class="material-symbols-outlined">
                       water_drop
                    </span>
                    <div class="condition-info">
                        <h5 class="regular-txt">Humidity</h5>
                        <div class="humidity-value-txt">55%</div>
                    </div>
                 </div>
                 <div class="condition-item">
                    <span class="material-symbols-outlined">
                       air
                    </span>
                    <div class="condition-info">
                        <h5 class="regular-txt">Wind Speed</h5>
                        <div class="wind-value-txt">2 M/s</div>
                    </div>
                 </div>
              </div>
              <div class="forecast-items-container">
                <div class="forecast-item">
                    <h5 class="forecast-item-date regular-txt">05 Aug</h5>
                    <img src="./assets/weather/thunderstorm.svg" alt="" class="forecast-item-img">
                    <h5 class="forecasr-item-temp">29 °C</h5>
                </div>
                <div class="forecast-item">
                    <h5 class="forecast-item-date regular-txt">05 Aug</h5>
                    <img src="./assets/weather/thunderstorm.svg" alt="" class="forecast-item-img">
                    <h5 class="forecasr-item-temp">29 °C</h5>
                </div>
                <div class="forecast-item">
                    <h5 class="forecast-item-date regular-txt">05 Aug</h5>
                    <img src="./assets/weather/thunderstorm.svg" alt="" class="forecast-item-img">
                    <h5 class="forecasr-item-temp">29 °C</h5>
                </div>
                <div class="forecast-item">
                    <h5 class="forecast-item-date regular-txt">05 Aug</h5>
                    <img src="./assets/weather/thunderstorm.svg" alt="" class="forecast-item-img">
                    <h5 class="forecasr-item-temp">29 °C</h5>
                </div>
                <div class="forecast-item">
                    <h5 class="forecast-item-date regular-txt">05 Aug</h5>
                    <img src="./assets/weather/thunderstorm.svg" alt="" class="forecast-item-img">
                    <h5 class="forecasr-item-temp">29 °C</h5>
                </div>
                <div class="forecast-item">
                    <h5 class="forecast-item-date regular-txt">05 Aug</h5>
                    <img src="./assets/weather/thunderstorm.svg" alt="" class="forecast-item-img">
                    <h5 class="forecasr-item-temp">29 °C</h5>
                </div>
              </div>
             
           </section>
           <section class="search-city section-message">

            <img src="./assets/message/search-city.png" alt="" >
            <div>
                <h1>Search City</h1>
                <h4 class="regular-txt">
                    Find out the weather conditions of the city
                </h4>
            </div>
           </section>
           <section class="not-found section-message" style="display: none;">

            <img src="./assets/message/not-found.png" alt="" >
            <div>
                <h1>Search City</h1>
                <h4 class="regular-txt">
                    Find out the weather conditions of the city
                </h4>
            </div>
           </section>
      </main>
</body>
</html>
